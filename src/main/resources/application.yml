server:
  port: 8080

spring:
  application:
    name: mock-server

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mockserver}
    username: ${DB_USER:mockserver}
    password: ${DB_PASS:mockserver}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  mvc:
    throw-exception-if-no-handler-found: false

# LDAP config for production (override via env or application-prod.yml)
app:
  ldap:
    url: ${LDAP_URL:ldap://localhost:389}
    base-dn: ${LDAP_BASE_DN:dc=mockserver,dc=com}
    user-dn-pattern: ${LDAP_USER_DN_PATTERN:uid={0},ou=people}
    group-search-base: ${LDAP_GROUP_SEARCH_BASE:ou=groups}
    manager-dn: ${LDAP_MANAGER_DN:}
    manager-password: ${LDAP_MANAGER_PASSWORD:}

  ports:
    range-start: 9000
    range-end: 9999
