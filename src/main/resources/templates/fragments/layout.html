<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle} + ' – Mocktail'">Mocktail</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link rel="stylesheet" th:href="@{/css/badges.css}"/>
</head>
<body th:attr="data-bs-theme=${@theme.currentTheme()}">
<nav class="sidebar d-flex flex-column">
  <div class="brand">Mock<span>tail</span><small th:text="'v' + ${@appVersion.version}">vdev</small></div>

  <ul class="nav flex-column flex-grow-1">
    <li class="nav-item">
      <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active'" th:href="@{/dashboard}">
        <i class="bi bi-speedometer2"></i> <span th:text="${@i18n.t('nav.dashboard')}">Dashboard</span>
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" th:classappend="${activePage == 'mocks'} ? 'active'" th:href="@{/mocks}">
        <i class="bi bi-layers"></i> <span th:text="${@i18n.t('nav.mocks')}">Mocks</span>
      </a>
    </li>
  </ul>

  <div class="px-3 pb-3" style="font-size:.8rem;">
    <div class="text-muted mb-1" th:text="${@i18n.t('nav.signedInAs')}">Signed in as</div>
    <div class="text-white fw-semibold" th:text="${user != null ? user.username : #authentication.name}">username</div>
    <div class="port-badge mt-1" th:if="${user != null}">
      Port: <strong th:text="${user.assignedPort}">9000</strong>
    </div>
    <form th:if="${@capabilities.authenticationRequired}" th:action="@{/logout}" method="post" class="w-100 mt-2">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-sm btn-outline-danger w-100">
        <i class="bi bi-box-arrow-right"></i>
        <span th:text="${@i18n.t('nav.logout')}">Logout</span>
      </button>
    </form>
  </div>
</nav>

<main class="main">
  <!-- Flash messages -->
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle me-1"></i>
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="bi bi-exclamation-triangle me-1"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Page content injected here -->
  <div th:replace="${content}"></div>
</main>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<div th:replace="${scripts} ?: ~{}"></div>
</body>
</html>
