<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<nav th:fragment="sidebar(activePage, user)"
     class="sidebar">

  <div class="brand">Mock<span>tail</span><small th:text="'v' + ${@appVersion.version}">vdev</small></div>

  <ul class="nav flex-column flex-grow-1">
    <li class="nav-item">
      <a class="nav-link"
         th:classappend="${activePage == 'dashboard'} ? 'active'"
         th:href="@{/dashboard}">
        <i class="bi bi-speedometer2"></i><span th:text="${@i18n.t('nav.dashboard')}">Dashboard</span>
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link"
         th:classappend="${activePage == 'mocks'} ? 'active'"
         th:href="@{/mocks}">
        <i class="bi bi-layers"></i><span th:text="${@i18n.t('nav.mocks')}">Mocks</span>
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link"
         th:classappend="${activePage == 'collections'} ? 'active'"
         th:href="@{/collections}">
        <i class="bi bi-collection"></i><span th:text="${@i18n.t('nav.collections')}">Collections</span>
      </a>
    </li>
    <li class="nav-item" th:if="${@capabilities.shared}">
      <a class="nav-link"
         th:classappend="${activePage == 'shared'} ? 'active'"
         th:href="@{/shared}">
        <i class="bi bi-share"></i><span th:text="${@i18n.t('nav.shared')}">Shared</span>
      </a>
    </li>
    <li class="nav-item" th:if="${@capabilities.admin}">
      <a class="nav-link"
         th:classappend="${activePage == 'admin'} ? 'active'"
         th:href="@{/admin/users}">
        <i class="bi bi-people"></i><span th:text="${@i18n.t('nav.admin')}">Admin</span>
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link"
         th:classappend="${activePage == 'settings'} ? 'active'"
        th:href="@{/settings}">
        <i class="bi bi-gear"></i>
        <span th:text="${@i18n.t('nav.settings')}">Settings</span>
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <div class="text-muted mb-1" style="font-size:.7rem;text-transform:uppercase;letter-spacing:.04em"
         th:text="${@i18n.t('nav.signedInAs')}">Signed in as</div>
    <div class="username" th:text="${user != null ? user.username : #authentication.name}">username</div>
    <div th:if="${user != null}" class="port-badge">
      :<span th:text="${user.assignedPort}">9000</span>
    </div>
    <form th:if="${@capabilities.authenticationRequired}" th:action="@{/logout}" method="post" class="w-100 mt-2">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-sm btn-outline-danger w-100">
        <i class="bi bi-box-arrow-right"></i>
        <span th:text="${@i18n.t('nav.logout')}">Logout</span>
      </button>
    </form>
  </div>
</nav>
</html>
