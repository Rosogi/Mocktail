<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${@i18n.t('password.title')})}"></head>

<body>
<nav th:replace="~{fragments/sidebar :: sidebar('settings', ${user})}"></nav>

<main class="main">
  <div th:replace="~{fragments/flash :: flash}"></div>

  <div class="page-header">
    <div>
      <h4 th:text="${@i18n.t('password.title')}">Change password</h4>
      <small class="text-muted" th:text="${@i18n.t('password.subtitle')}">Set a new password before continuing</small>
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 col-xl-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <form th:action="@{/password/change}" method="post">
            <div class="mb-3">
              <label class="form-label fw-semibold" th:text="${@i18n.t('password.current')}">Current password</label>
              <input type="password" name="currentPassword" class="form-control" required autofocus/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" th:text="${@i18n.t('password.new')}">New password</label>
              <input type="password" name="newPassword" class="form-control" minlength="12" required/>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold" th:text="${@i18n.t('password.confirm')}">Confirm password</label>
              <input type="password" name="confirmPassword" class="form-control" minlength="12" required/>
            </div>
            <button class="btn btn-primary btn-sm w-100" type="submit" th:text="${@i18n.t('password.submit')}">Change password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
