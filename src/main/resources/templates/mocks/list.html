<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Mocks')}"></head>

<body>

<nav th:replace="~{fragments/sidebar :: sidebar('mocks', ${user})}"></nav>

<main class="main">

  <div th:replace="~{fragments/flash :: flash}"></div>

  <div class="page-header">
    <div>
      <h4>Mock definitions</h4>
      <small class="text-muted" th:text="${mocks.size()} + ' mocks configured'"></small>
    </div>
    <a th:href="@{/mocks/new}" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-lg me-1"></i>New mock
    </a>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover table-sm mb-0">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th style="width:90px">Method</th>
            <th>Path pattern</th>
            <th style="width:70px">Status</th>
            <th style="width:60px">Priority</th>
            <th style="width:80px">Active</th>
            <th style="width:120px"></th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${mocks.empty}">
            <td colspan="7" class="text-center text-muted py-5">
              <i class="bi bi-layers d-block mb-2" style="font-size:2.2rem"></i>
              No mocks yet. <a th:href="@{/mocks/new}">Create your first mock</a>
            </td>
          </tr>
          <tr th:each="mock : ${mocks}">
            <td class="mock-name" th:text="${mock.name}"></td>
            <td>
              <span class="method-badge"
                    th:classappend="'method-' + (${mock.httpMethod == '*'} ? 'ANY' : ${mock.httpMethod})"
                    th:text="${mock.httpMethod == '*'} ? '* ANY' : ${mock.httpMethod}"></span>
            </td>
            <td class="font-monospace" style="font-size:.82rem" th:text="${mock.pathPattern}"></td>
            <td>
              <span class="badge"
                    th:classappend="${mock.responseStatus < 300} ? 'status-2xx' :
                                     (${mock.responseStatus < 400} ? 'status-3xx' :
                                      (${mock.responseStatus < 500} ? 'status-4xx' : 'status-5xx'))"
                    th:text="${mock.responseStatus}"></span>
            </td>
            <td class="text-center text-muted" th:text="${mock.priority}"></td>
            <td>
              <form th:action="@{/mocks/{id}/toggle(id=${mock.id})}" method="post" class="d-inline">
                <button type="submit" class="btn p-0 border-0 bg-transparent">
                  <i th:class="${mock.active ? 'bi bi-toggle-on text-success fs-5' : 'bi bi-toggle-off text-muted fs-5'}"></i>
                </button>
              </form>
            </td>
            <td>
              <a th:href="@{/mocks/{id}/edit(id=${mock.id})}"
                 class="btn btn-sm btn-outline-secondary py-0 px-2 me-1">
                <i class="bi bi-pencil"></i>
              </a>
              <form th:action="@{/mocks/{id}/delete(id=${mock.id})}" method="post"
                    class="d-inline"
                    th:attr="data-name=${mock.name}"
                    onsubmit="return confirmDelete(this)">
                <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2">
                  <i class="bi bi-trash"></i>
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
