<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${collection.name})}"></head>
<body th:attr="data-bs-theme=${@theme.currentTheme()}">
<nav th:replace="~{fragments/sidebar :: sidebar('collections', ${user})}"></nav>
<main class="main">

    <div th:replace="~{fragments/flash :: flash}"></div>

    <div class="d-flex align-items-center gap-2 mb-3">
        <a th:href="@{/collections}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <h4 class="mb-0" th:text="${collection.name}">Collection</h4>
                <span th:if="${@capabilities.shared and collection.shared}" class="badge bg-primary" th:text="${@i18n.t('badges.shared')}">Shared</span>
                <span th:if="${@capabilities.shared and collection.readOnly}" class="badge bg-info text-dark">
                    <i class="bi bi-lock"></i> <span th:text="${@i18n.t('badges.readOnly')}">Read-only</span>
                </span>
                <span th:if="${@capabilities.shared and hasUpdate == true}" class="badge bg-warning text-dark"
                      th:text="${@i18n.t('badges.updateAvailable')}">Update available</span>
                <span th:if="${@capabilities.shared and collection.readOnly and sourceAvailable == false}" class="badge bg-secondary"
                      th:text="${@i18n.t('badges.sourceUnavailable')}">Source unavailable</span>
            </div>
            <small class="text-muted" th:text="${collection.description}"></small>
        </div>
        <div class="ms-auto d-flex gap-2 flex-wrap">
            <form th:action="@{/collections/{id}/enable-all(id=${collection.id})}" method="post">
                <button class="btn btn-sm btn-outline-success">
                    <i class="bi bi-play-fill"></i> <span th:text="${@i18n.t('actions.enableAll')}">Enable all</span>
                </button>
            </form>
            <form th:action="@{/collections/{id}/disable-all(id=${collection.id})}" method="post">
                <button class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-pause-fill"></i> <span th:text="${@i18n.t('actions.disableAll')}">Disable all</span>
                </button>
            </form>
            <form th:if="${@capabilities.shared and collection.readOnly and hasUpdate == true}"
                  th:action="@{/shared/subscriptions/{id}/update(id=${collection.id})}" method="post">
                <button class="btn btn-sm btn-warning">
                    <i class="bi bi-arrow-clockwise"></i> <span th:text="${@i18n.t('actions.update')}">Update</span>
                </button>
            </form>
            <div class="dropdown">
                <button class="btn btn-sm btn-outline-secondary"
                        type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-three-dots"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a th:href="@{/collections/{id}/export(id=${collection.id})}" class="dropdown-item">
                            <i class="bi bi-download me-2"></i><span th:text="${@i18n.t('actions.export')}">Export</span>
                        </a>
                    </li>
                    <li th:if="${@capabilities.shared and not collection.readOnly and not collection.shared}">
                        <form th:action="@{/collections/{id}/share(id=${collection.id})}" method="post">
                            <button class="dropdown-item" type="submit">
                                <i class="bi bi-share me-2"></i><span th:text="${@i18n.t('actions.share')}">Share</span>
                            </button>
                        </form>
                    </li>
                    <li th:if="${@capabilities.shared and not collection.readOnly and collection.shared}">
                        <form th:action="@{/collections/{id}/unshare(id=${collection.id})}" method="post">
                            <button class="dropdown-item" type="submit">
                                <i class="bi bi-slash-circle me-2"></i><span th:text="${@i18n.t('actions.unshare')}">Unshare</span>
                            </button>
                        </form>
                    </li>
                    <li th:if="${@capabilities.shared and collection.readOnly}">
                        <form th:action="@{/shared/subscriptions/{id}/copy(id=${collection.id})}" method="post">
                            <button class="dropdown-item" type="submit">
                                <i class="bi bi-copy me-2"></i><span th:text="${@i18n.t('actions.copyEditable')}">Copy editable</span>
                            </button>
                        </form>
                    </li>
                    <li th:if="${@capabilities.shared and collection.readOnly}">
                        <hr class="dropdown-divider"/>
                    </li>
                    <li th:if="${@capabilities.shared and collection.readOnly}">
                        <form th:action="@{/shared/subscriptions/{id}/unsubscribe(id=${collection.id})}" method="post">
                            <button class="dropdown-item text-danger" type="submit">
                                <i class="bi bi-bookmark-dash me-2"></i><span th:text="${@i18n.t('actions.unsubscribe')}">Unsubscribe</span>
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div class="row g-3">

        <!-- Mocks in this collection -->
        <div th:class="${collection.readOnly ? 'col-md-12' : 'col-md-8'}">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold">
                    <span th:text="${@i18n.t('collections.mocksInCollection')}">Mocks in collection</span>
                    <span class="badge bg-secondary ms-1" th:text="${mocks.size()}">0</span>
                </div>
                <div class="card-body p-0">
                    <table class="table table-sm table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th th:text="${@i18n.t('mocks.name')}">Name</th>
                            <th style="width:80px" th:text="${@i18n.t('mocks.method')}">Method</th>
                            <th th:text="${@i18n.t('dashboard.table.path')}">Path</th>
                            <th style="width:70px" th:text="${@i18n.t('mocks.active')}">Active</th>
                            <th th:if="${not collection.readOnly}" style="width:50px"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${mocks.empty}">
                            <td th:colspan="${collection.readOnly ? 4 : 5}" class="text-center text-muted py-3">
                                <span th:text="${@i18n.t('collections.emptyInCollection')}">No mocks in this collection yet</span>
                            </td>
                        </tr>
                        <tr th:each="mock : ${mocks}">
                            <td th:text="${mock.name}"></td>
                            <td>
                  <span class="method-badge"
                        th:classappend="'method-' + (${mock.httpMethod == '*'} ? 'ANY' : ${mock.httpMethod})"
                        th:text="${mock.httpMethod}"></span>
                            </td>
                            <td class="font-monospace" style="font-size:.8rem" th:text="${mock.pathPattern}"></td>
                            <td>
                                <i th:class="${mock.active ? 'bi bi-toggle-on text-success fs-5' :
                                               'bi bi-toggle-off text-muted fs-5'}"></i>
                            </td>
                            <td th:if="${not collection.readOnly}">
                                <form th:action="@{/collections/{cid}/remove-mock(cid=${collection.id})}"
                                      method="post">
                                    <input type="hidden" name="mockId" th:value="${mock.id}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2"
                                            th:title="${@i18n.t('tooltips.removeFromCollection')}">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Add mock panel -->
        <div class="col-md-4" th:if="${not collection.readOnly}">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold" th:text="${@i18n.t('collections.addMock')}">Add mock</div>
                <div class="card-body">
                    <p class="text-muted small mb-3" th:text="${@i18n.t('collections.addMockHelp')}">
                        Select a mock to add to this collection. Only mocks not already in a collection are shown.
                    </p>
                    <form th:action="@{/collections/{id}/add-mock(id=${collection.id})}" method="post">
                        <div class="mb-2">
                            <select name="mockId" class="form-select form-select-sm" required>
                                <option value="" th:text="${@i18n.t('collections.selectMock')}">— Select mock —</option>
                                <option th:each="mock : ${allMocks}"
                                        th:if="${(mock.collection == null or not mock.collection.readOnly) and (mock.collection == null or mock.collection.id == collection.id)}"
                                        th:value="${mock.id}"
                                        th:text="${mock.name + ' (' + mock.httpMethod + ' ' + mock.pathPattern + ')'}">
                                </option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-sm btn-primary w-100">
                            <i class="bi bi-plus-lg me-1"></i><span th:text="${@i18n.t('actions.addToCollection')}">Add to collection</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</main>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
