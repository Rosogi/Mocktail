services:
  db:
    image: postgres:16-alpine
    container_name: mocktail-db-database
    restart: unless-stopped
    environment:
      POSTGRES_DB:       mocktail
      POSTGRES_USER:     mocktail
      POSTGRES_PASSWORD: ${DB_PASS:-mocktail}
    volumes:
      - pg_data_database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mocktail -d mocktail"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mocktail-app-database
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8999:8999"
      - "9000-9020:9000-9020"
    environment:
      MOCKTAIL_MODE: database
      DB_URL:  jdbc:postgresql://db:5432/mocktail
      DB_USER: mocktail
      DB_PASS: ${DB_PASS:-mocktail}
      MOCKTAIL_DATABASE_BOOTSTRAP_ADMIN_LOGIN: ${MOCKTAIL_DATABASE_BOOTSTRAP_ADMIN_LOGIN:-admin}
      MOCKTAIL_DATABASE_BOOTSTRAP_ADMIN_PASSWORD: ${MOCKTAIL_DATABASE_BOOTSTRAP_ADMIN_PASSWORD:-}
    networks:
      - internal

volumes:
  pg_data_database:

networks:
  internal:
    driver: bridge
